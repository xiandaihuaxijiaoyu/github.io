<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的公司官网</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #fff;
            padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo {
            height: 50px;
        }
        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }
        .course-img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin: 20px 0;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="images/logo.png" alt="公司Logo" class="logo">
        <span class="company-name">你的公司名称</span>
    </div>
    
    <div class="container">
        <h1>欢迎来到我们的网站</h1>
        <p>我们是一家专业的培训机构，致力于提供优质的课程。</p>
        
        <img src="images/课程展示.jpg" alt="课程展示" class="course-img">
        
        <h2>我们的优势</h2>
        <ul>
            <li>专业讲师团队</li>
            <li>实战项目驱动</li>
            <li>就业推荐服务</li>
        </ul>
        
        <p>联系电话：400-123-4567</p>
        <p>邮箱：contact@yourcompany.com</p>
    </div>
</body>
</html>
